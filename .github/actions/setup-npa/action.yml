name: Setup pinned npa
description: Locate a pinned npa binary or build npa-cli from a pinned npa git ref.

inputs:
  npa-binary-path:
    description: Existing executable npa path, absolute or package-root relative.
    required: false
    default: ""
  npa-version:
    description: Reserved exact npa release version input.
    required: false
    default: ""
  npa-git-tag:
    description: Exact immutable npa git tag to build.
    required: false
    default: ""
  npa-git-commit:
    description: Full npa git commit SHA to build.
    required: false
    default: ""
  rust-toolchain-version:
    description: Exact Rust toolchain version for git builds.
    required: false
    default: "1.95.0"

runs:
  using: composite
  steps:
    - name: Locate or build pinned npa
      shell: bash
      env:
        NPA_BINARY_PATH: ${{ inputs.npa-binary-path }}
        NPA_VERSION: ${{ inputs.npa-version }}
        NPA_GIT_TAG: ${{ inputs.npa-git-tag }}
        NPA_GIT_COMMIT: ${{ inputs.npa-git-commit }}
        RUST_TOOLCHAIN_VERSION: ${{ inputs.rust-toolchain-version }}
      run: |
        set -euo pipefail
        bash "$GITHUB_ACTION_PATH/setup-pinned-npa.sh"
